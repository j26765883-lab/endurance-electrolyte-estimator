name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"] # This tells it to run every time you push to 'main'

# Sets permissions so the script is allowed to publish your site
permissions:
  contents: read
  pages: write
  id-token: write

# Prevents multiple deployments from running at the exact same time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install

      # NEW STEP: Run unit tests before building
      - name: Run unit tests
        run: npm run test
        
      - name: Build project
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4